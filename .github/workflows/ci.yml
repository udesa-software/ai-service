name: CI

on:
  push:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit --cov=src --cov-report=xml:coverage.xml

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: udesa-software/ai-service
          files: api/coverage.xml
          flags: unit
          fail_ci_if_error: true

      - name: Run integration tests
        run: pytest tests/integration --cov=main --cov=src --cov-report=xml:coverage-integration.xml

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: udesa-software/ai-service
          files: api/coverage-integration.xml
          flags: integration
          fail_ci_if_error: true
