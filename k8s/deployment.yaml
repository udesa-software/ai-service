apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: tds-group-3
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: 172786533418.dkr.ecr.us-east-2.amazonaws.com/tds-group-3/ai-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: ai-service-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-service-secret
                  key: JWT_SECRET
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-service-secret
                  key: INTERNAL_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: embeddings
              mountPath: /app/data
      volumes:
        - name: embeddings
          emptyDir: {}
